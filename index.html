<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Pigeon Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .post-card { transition: transform 0.3s ease; }
        .post-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="pb-20 font-sans">

    <nav class="glass fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-black text-sky-400">PIGEON<span class="text-white">LIVE</span></h1>
        <button onclick="toggleModal(true)" class="bg-sky-600 hover:bg-sky-500 font-bold px-4 py-2 rounded-xl text-sm transition">
            <i class="fa-solid fa-plus mr-1"></i> Sell Pigeon
        </button>
    </nav>

    <div class="pt-28 px-4 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-bold">Global Marketplace</h2>
                <p class="text-xs text-slate-400">Real-time listings stored in the cloud</p>
            </div>
            <div id="loading-status" class="text-xs text-sky-400 font-mono animate-pulse">Connecting to Cloud...</div>
        </div>
        
        <div id="listings-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </div>

    <div id="post-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="glass w-full max-w-md p-6 rounded-3xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold mb-4 text-sky-400">Create Live Listing</h3>
            
            <label class="text-xs text-slate-400 block mb-1">Pigeon Breed / Title</label>
            <input id="pigeon-name" type="text" placeholder="e.g., Rare Red Modena" class="w-full bg-slate-800/80 border border-slate-700 p-3 rounded-xl mb-3 outline-none text-white text-sm">
            
            <label class="text-xs text-slate-400 block mb-1">Price ($)</label>
            <input id="pigeon-price" type="number" placeholder="60" class="w-full bg-slate-800/80 border border-slate-700 p-3 rounded-xl mb-3 outline-none text-white text-sm">
            
            <label class="text-xs text-slate-400 block mb-1">Your WhatsApp Number (Include Country Code)</label>
            <input id="pigeon-phone" type="text" placeholder="94771234567" class="w-full bg-slate-800/80 border border-slate-700 p-3 rounded-xl mb-3 outline-none text-white text-sm">
            
            <label class="text-xs text-slate-400 block mb-1">ImgBB Direct Image URL</label>
            <input id="pigeon-image" type="text" placeholder="https://i.ibb.co/..." class="w-full bg-slate-800/80 border border-slate-700 p-3 rounded-xl mb-5 outline-none text-white text-sm">
            
            <button onclick="submitToCloud()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3.5 rounded-xl font-bold transition text-sm shadow-lg shadow-emerald-900/20">Publish To Global Feed</button>
            <button onclick="toggleModal(false)" class="w-full text-slate-400 text-xs py-2 mt-2 hover:text-white transition">Cancel</button>
        </div>
    </div>

    <script>
        // 1. Live Temporary Test Database Config (No phone memory used)
        const firebaseConfig = {
            databaseURL: "https://pigeon-market-default-rtdb.firebaseio.com/"
        };
        
        // Initialize Cloud Connection
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const listingsRef = database.ref('listings');

        // 2. Listen to Cloud Server Changes Live
        listingsRef.on('value', (snapshot) => {
            document.getElementById('loading-status').innerText = "● System Live";
            const grid = document.getElementById('listings-grid');
            grid.innerHTML = ''; // Wipe old elements
            
            const data = snapshot.val();
            if (!data) {
                grid.innerHTML = `<p class="text-slate-500 text-center col-span-full py-12">No active listings in the cloud. Be the first to add one!</p>`;
                return;
            }

            // Convert cloud object map to array and reverse to show newest first
            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                const msg = encodeURIComponent(`Hi, I am interested in your listing: "${item.name}" for $${item.price}. Is it available?`);
                const waLink = `https://wa.me/${item.phone}?text=${msg}`;

                grid.innerHTML += `
                    <div class="glass post-card rounded-2xl overflow-hidden p-3 flex flex-col justify-between border border-slate-800">
                        <div>
                            <img src="${item.image}" class="w-full h-52 object-cover rounded-xl mb-3 bg-slate-900">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="text-base font-bold tracking-tight text-white">${item.name}</h3>
                                <span class="text-emerald-400 font-extrabold text-base">$${item.price}</span>
                            </div>
                            <p class="text-[11px] text-slate-400 mb-3"><i class="fa-solid fa-user text-[9px] text-sky-400"></i> Seller ID: +${item.phone}</p>
                        </div>
                        <a href="${waLink}" target="_blank" class="w-full bg-emerald-600 hover:bg-emerald-500 py-2.5 rounded-xl font-bold text-center block text-xs transition">
                            <i class="fa-brands fa-whatsapp mr-1 text-sm"></i> Chat on WhatsApp
                        </a>
                    </div>`;
            });
        });

        // 3. UI Controllers
        function toggleModal(show) {
            document.getElementById('post-modal').classList.toggle('hidden', !show);
        }

        // 4. Send Post data to Cloud Database
        function submitToCloud() {
            const name = document.getElementById('pigeon-name').value.trim();
            const price = document.getElementById('pigeon-price').value.trim();
            const phone = document.getElementById('pigeon-phone').value.trim();
            let image = document.getElementById('pigeon-image').value.trim();

            if (!name || !price || !phone) {
                alert("Please type a Name, Price, and your WhatsApp Phone number!");
                return;
            }

            if (!image) {
                image = "https://via.placeholder.com/400x300/1e293b/ffffff?text=No+Photo+Uploaded";
            }

            // This pushes directly to Google cloud instantly
            listingsRef.push({
                name: name,
                price: price,
                phone: phone,
                image: image
            }).then(() => {
                toggleModal(false);
                // Clear input boxes cleanly
                document.getElementById('pigeon-name').value = '';
                document.getElementById('pigeon-price').value = '';
                document.getElementById('pigeon-phone').value = '';
                document.getElementById('pigeon-image').value = '';
            }).catch(err => {
                alert("Cloud write error: " + err.message);
            });
        }
    </script>
</body>
    </html>
