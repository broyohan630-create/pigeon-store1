<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Pigeon Hub</title>
    <!-- We still use Tailwind for the layout structure -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* 1. Professional Dark Background */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
        }

        /* 2. Glassmorphism Sticky Menu */
        .glass-menu {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 3. Card Hover & Lift Animation */
        .pigeon-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pigeon-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(56, 189, 248, 0.4); /* Glow effect on the border */
        }

        /* 4. Glowing Button Animation */
        .buy-btn {
            background: linear-gradient(90deg, #0ea5e9, #3b82f6);
            transition: all 0.3s ease;
        }
        .buy-btn:hover {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
            transform: scale(1.05);
        }
        .buy-btn:active {
            transform: scale(0.95); /* Button shrinks slightly when clicked */
        }

        /* 5. Smooth Fade-In on Page Load */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- The Top Navigation Menu -->
    <nav class="glass-menu fixed w-full top-0 z-50 transition-all duration-300">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <!-- Your Logo/Brand Name -->
            <div class="text-2xl font-extrabold tracking-wider text-sky-400">PIGEON<span class="text-white">HUB</span></div>
            
            <!-- Menu Links (Hidden on small mobile screens, visible on tablets/laptops) -->
            <div class="hidden md:flex space-x-8 text-sm font-semibold tracking-wide">
                <a href="#" class="hover:text-sky-400 transition">All Birds</a>
                <a href="#" class="hover:text-sky-400 transition">Fancy Breeds</a>
                <a href="#" class="hover:text-sky-400 transition">Racing</a>
                <a href="#" class="hover:text-sky-400 transition">Contact</a>
            </div>
            
            <!-- Mobile Hamburger Icon -->
            <div class="md:hidden text-2xl cursor-pointer hover:text-sky-400 transition">☰</div>
        </div>
    </nav>

    <!-- Header Section -->
    <header class="pt-32 pb-12 text-center animate-fade">
        <h1 class="text-4xl md:text-5xl font-black mb-4">The Premium Collection</h1>
        <p class="text-slate-400 text-lg">Exquisite birds, verified genetics.</p>
    </header>

    <!-- Storefront Grid -->
    <div id="storefront" class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8 pb-20">
        <!-- The cards will appear here automatically -->
    </div>

    <script>
        // --- ADMIN AREA: Add your pigeons here ---
        const myPigeons = [
            {
                name: "White Fantail",
                price: "$45",
                desc: "Pure white, high tail carriage, fully vaccinated.",
                image: "https://via.placeholder.com/400x300/1e293b/ffffff?text=White+Fantail",
                link: "https://wa.me/YOURNUMBER"
            },
            {
                name: "Racing Homer",
                price: "$75",
                desc: "Strong wings, excellent for long distance flying.",
                image: "https://via.placeholder.com/400x300/1e293b/ffffff?text=Racing+Homer",
                link: "https://wa.me/YOURNUMBER"
            },
            {
                name: "Red Modena",
                price: "$55",
                desc: "Deep red color, calm temperament, great posture.",
                image: "https://via.placeholder.com/400x300/1e293b/ffffff?text=Red+Modena",
                link: "https://wa.me/YOURNUMBER"
            }
        ];
        // -----------------------------------------

        // JavaScript Function to generate a professional UI Click Sound
        function playClickSound() {
            // We use the browser's built-in audio engine so you don't need MP3 files
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return; 
            
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();

            osc.type = 'sine'; // Smooth clean tone
            osc.frequency.setValueAtTime(600, ctx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);

            gainNode.gain.setValueAtTime(0.1, ctx.currentTime); // Volume
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1); // Fade out fast

            osc.connect(gainNode);
            gainNode.connect(ctx.destination);

            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }

        // Load the Pigeons into the page with a staggering animation
        const container = document.getElementById('storefront');
        
        myPigeons.forEach((bird, index) => {
            // Each card loads 0.2 seconds after the previous one
            const delay = index * 0.2; 
            
            container.innerHTML += `
                <div class="pigeon-card rounded-2xl overflow-hidden animate-fade" style="animation-delay: ${delay}s; opacity: 0;">
                    <img src="${bird.image}" class="w-full h-56 object-cover border-b border-slate-700">
                    <div class="p-6">
                        <h2 class="text-2xl font-bold text-white mb-1">${bird.name}</h2>
                        <div class="text-sky-400 font-black text-xl mb-3">${bird.price}</div>
                        <p class="text-slate-400 text-sm mb-6 h-10">${bird.desc}</p>
                        
                        <a href="${bird.link}" 
                           target="_blank"
                           onclick="playClickSound()" 
                           class="buy-btn text-white w-full py-3 rounded-xl font-bold flex justify-center items-center gap-2">
                           Buy on WhatsApp
                        </a>
                    </div>
                </div>
            `;
        });
    </script>
</body>
 </html>
