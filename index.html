<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Pigeon Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pigeon-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold">Pigeon Hub</h1>
        <p class="mt-2 text-blue-100">Quality Birds | Instant WhatsApp Ordering</p>
    </header>

    <!-- Product Grid -->
    <div id="storefront" class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Birds will appear here automatically -->
    </div>

    <script>
        // --- EDIT ONLY THIS PART TO ADD BIRDS ---
        const myPigeons = [
            {
                name: "White Fantail",
                price: "$45",
                desc: "Pure white, high tail carriage, vaccinated.",
                image: "https://via.placeholder.com/300x200?text=Pigeon+1",
                link: "https://wa.me/YOURNUMBER?text=Hi,I+want+the+White+Fantail"
            },
            {
                name: "Racing Homer",
                price: "$60",
                desc: "Strong wings, excellent for long distance.",
                image: "https://via.placeholder.com/300x200?text=Pigeon+2",
                link: "https://wa.me/YOURNUMBER?text=Hi,I+want+the+Racing+Homer"
            },
            {
                name: "Red Modena",
                price: "$35",
                desc: "Beautiful deep red color, very calm bird.",
                image: "https://via.placeholder.com/300x200?text=Pigeon+3",
                link: "https://wa.me/YOURNUMBER?text=Hi,I+want+the+Red+Modena"
            }
        ];
        // ----------------------------------------

        const container = document.getElementById('storefront');

        myPigeons.forEach(bird => {
            container.innerHTML += `
                <div class="pigeon-card bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
                    <img src="${bird.image}" class="w-full h-48 object-cover">
                    <div class="p-4 text-center">
                        <h2 class="text-xl font-bold text-gray-800">${bird.name}</h2>
                        <p class="text-blue-600 font-bold text-lg my-1">${bird.price}</p>
                        <p class="text-gray-500 text-sm mb-4">${bird.desc}</p>
                        <a href="${bird.link}" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-full font-bold inline-block transition">
                            Buy via WhatsApp
                        </a>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
