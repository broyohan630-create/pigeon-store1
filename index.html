<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pigeon Store</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; text-align: center; }
        header { background: #333; color: white; padding: 1rem; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { background: white; margin: 10px; padding: 15px; border-radius: 10px; width: 280px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 8px; height: 200px; object-fit: cover; }
        .price { color: #2ecc71; font-size: 1.5rem; font-weight: bold; margin: 10px 0; }
        .btn { background: #25d366; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <h1>Pigeon Shop</h1>
    <p>Premium Birds for Sale</p>
</header>

<div class="container">
    <!-- Product 1 -->
    <div class="card">
        <img src="https://via.placeholder.com/300x200?text=Pigeon+Photo" alt="Pigeon">
        <h3>Fantail Pigeon</h3>
        <p class="price">$25.00</p>
        <p>Healthy, active, and high-quality breed.</p>
        <a href="https://wa.me/YOUR_PHONE_NUMBER?text=I+want+to+buy+the+Fantail+Pigeon" class="btn">Order via WhatsApp</a>
    </div>

    <!-- Copy the block above to add more pigeons -->
</div>

</body>
</html>
