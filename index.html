<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Pigeon Store</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .pigeon-card { transition: all 0.3s ease; }
        .pigeon-card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .whatsapp-btn { background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); }
    </style>
</head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Pigeon Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pigeon-card { transition: all 0.3s ease; }
        .pigeon-card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .whatsapp-btn { background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-gray-900 text-white py-10 text-center">
        <h1 class="text-4xl font-extrabold">Pigeon Hub</h1>
        <p class="text-gray-400 mt-2">The Best Birds, Delivered to You</p>
    </header>

    <div id="storefront" class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8"></div>

    <script>
        // --- ADMIN AREA: ONLY EDIT THIS LIST ---
        const myPigeons = [
            {
                name: "White Fantail",
                price: "$45",
                desc: "High quality breed, vaccinated.",
                image: "https://via.placeholder.com/400x300",
                link: "https://wa.me/YOURNUMBER"
            },
            {
                name: "Racing Homer",
                price: "$75",
                desc: "Fast and reliable performance bird.",
                image: "https://via.placeholder.com/400x300",
                link: "https://wa.me/YOURNUMBER"
            }
        ];
        // --- END OF ADMIN AREA ---

        const container = document.getElementById('storefront');
        myPigeons.forEach(bird => {
            container.innerHTML += `
                <div class="pigeon-card bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                    <img src="${bird.image}" class="w-full h-56 object-cover">
                    <div class="p-6 text-center">
                        <h2 class="text-2xl font-bold text-gray-800">${bird.name}</h2>
                        <span class="inline-block bg-red-50 text-red-600 px-3 py-1 rounded-md font-bold my-2 border border-red-100">${bird.price}</span>
                        <p class="text-gray-500 text-sm mb-6">${bird.desc}</p>
                        <a href="${bird.link}" class="whatsapp-btn text-white w-full py-3 rounded-xl font-bold block transition shadow-lg">Buy on WhatsApp</a>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
